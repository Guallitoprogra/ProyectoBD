<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <style>
      .title{font:700 30px Arial,sans-serif}
      .entity{fill:#f8fafc;stroke:#111827;stroke-width:2}
      .sale{fill:#e0f7fa;stroke:#0e7490;stroke-width:2}
      .detail{fill:#fff7ed;stroke:#c2410c;stroke-width:2}
      .product{fill:#f0fdf4;stroke:#15803d;stroke-width:2}
      .category{fill:#eff6ff;stroke:#2563eb;stroke-width:2}
      .provider{fill:#fdf2f8;stroke:#db2777;stroke-width:2}
      .attr{fill:white;stroke:#1f2937;stroke-width:1.5}
      .rel{fill:white;stroke:#111827;stroke-width:2}
      .line{stroke:#111827;stroke-width:2;fill:none}
      .label{font:700 16px Arial,sans-serif;text-anchor:middle;dominant-baseline:middle}
      .small{font:13px Arial,sans-serif;text-anchor:middle;dominant-baseline:middle}
      .key{font:13px Arial,sans-serif;text-anchor:middle;dominant-baseline:middle;text-decoration:underline}
      .card{font:700 17px Arial,sans-serif}
    </style>
  </defs>
  <rect width="1800" height="900" fill="url(#grid)"/>
  <text x="900" y="65" class="title" text-anchor="middle">Diagrama Entidad-Relacion - Gestion de tienda</text>

  <!-- Cliente -->
  <rect x="110" y="210" width="145" height="60" class="entity"/>
  <text x="182.5" y="240" class="label">Cliente</text>
  <ellipse cx="55" cy="135" rx="55" ry="20" class="attr"/><text x="55" y="135" class="key">id_cliente</text>
  <ellipse cx="180" cy="110" rx="50" ry="20" class="attr"/><text x="180" y="110" class="small">nombre</text>
  <ellipse cx="300" cy="140" rx="42" ry="20" class="attr"/><text x="300" y="140" class="small">nit</text>
  <ellipse cx="55" cy="315" rx="55" ry="20" class="attr"/><text x="55" y="315" class="small">telefono</text>
  <ellipse cx="210" cy="325" rx="48" ry="20" class="attr"/><text x="210" y="325" class="small">email</text>
  <line x1="95" y1="150" x2="130" y2="210" class="line"/><line x1="180" y1="130" x2="180" y2="210" class="line"/>
  <line x1="275" y1="155" x2="230" y2="210" class="line"/><line x1="95" y1="305" x2="130" y2="270" class="line"/><line x1="205" y1="305" x2="200" y2="270" class="line"/>

  <!-- Empleado -->
  <rect x="110" y="610" width="145" height="60" class="entity"/>
  <text x="182.5" y="640" class="label">Empleado</text>
  <ellipse cx="55" cy="560" rx="62" ry="20" class="attr"/><text x="55" y="560" class="key">id_empleado</text>
  <ellipse cx="180" cy="520" rx="50" ry="20" class="attr"/><text x="180" y="520" class="small">nombre</text>
  <ellipse cx="310" cy="565" rx="48" ry="20" class="attr"/><text x="310" y="565" class="small">puesto</text>
  <ellipse cx="120" cy="750" rx="88" ry="21" class="attr"/><text x="120" y="750" class="small">fecha_contratacion</text>
  <line x1="95" y1="570" x2="125" y2="610" class="line"/><line x1="180" y1="540" x2="180" y2="610" class="line"/>
  <line x1="285" y1="578" x2="245" y2="610" class="line"/><line x1="135" y1="730" x2="155" y2="670" class="line"/>

  <!-- Venta -->
  <rect x="600" y="405" width="150" height="70" class="sale"/>
  <text x="675" y="440" class="label">Venta</text>
  <ellipse cx="555" cy="315" rx="52" ry="20" class="attr"/><text x="555" y="315" class="key">id_venta</text>
  <ellipse cx="680" cy="300" rx="45" ry="20" class="attr"/><text x="680" y="300" class="small">fecha</text>
  <ellipse cx="800" cy="320" rx="45" ry="20" class="attr"/><text x="800" y="320" class="small">total</text>
  <ellipse cx="690" cy="530" rx="48" ry="20" class="attr"/><text x="690" y="530" class="small">estado</text>
  <line x1="575" y1="333" x2="625" y2="405" class="line"/><line x1="680" y1="320" x2="680" y2="405" class="line"/>
  <line x1="780" y1="335" x2="725" y2="405" class="line"/><line x1="690" y1="510" x2="690" y2="475" class="line"/>

  <!-- Relations left -->
  <polygon points="400,285 455,335 400,385 345,335" class="rel"/><text x="400" y="335" class="small">realiza</text>
  <line x1="255" y1="250" x2="345" y2="335" class="line"/><line x1="455" y1="335" x2="600" y2="405" class="line"/>
  <text x="280" y="268" class="card">1</text><text x="545" y="385" class="card">N</text>
  <polygon points="400,535 455,585 400,635 345,585" class="rel"/><text x="400" y="585" class="small">atiende</text>
  <line x1="255" y1="640" x2="345" y2="585" class="line"/><line x1="455" y1="585" x2="600" y2="475" class="line"/>
  <text x="280" y="625" class="card">1</text><text x="545" y="525" class="card">N</text>

  <!-- Detalle -->
  <rect x="980" y="405" width="170" height="70" class="detail"/>
  <text x="1065" y="440" class="label">Detalle_venta</text>
  <ellipse cx="965" cy="310" rx="55" ry="20" class="attr"/><text x="965" y="310" class="key">id_detalle</text>
  <ellipse cx="1090" cy="300" rx="55" ry="20" class="attr"/><text x="1090" y="300" class="small">cantidad</text>
  <ellipse cx="1215" cy="330" rx="75" ry="20" class="attr"/><text x="1215" y="330" class="small">precio_unitario</text>
  <ellipse cx="1090" cy="535" rx="55" ry="20" class="attr"/><text x="1090" y="535" class="small">subtotal</text>
  <line x1="980" y1="326" x2="1015" y2="405" class="line"/><line x1="1088" y1="320" x2="1075" y2="405" class="line"/>
  <line x1="1185" y1="345" x2="1120" y2="405" class="line"/><line x1="1090" y1="515" x2="1090" y2="475" class="line"/>

  <polygon points="850,398 915,440 850,482 785,440" class="rel"/><text x="850" y="440" class="small">incluye</text>
  <line x1="750" y1="440" x2="785" y2="440" class="line"/><line x1="915" y1="440" x2="980" y2="440" class="line"/>
  <text x="770" y="430" class="card">1</text><text x="950" y="430" class="card">N</text>

  <!-- Producto -->
  <rect x="1370" y="405" width="150" height="70" class="product"/>
  <text x="1445" y="440" class="label">Producto</text>
  <ellipse cx="1310" cy="335" rx="60" ry="20" class="attr"/><text x="1310" y="335" class="key">id_producto</text>
  <ellipse cx="1430" cy="310" rx="50" ry="20" class="attr"/><text x="1430" y="310" class="small">nombre</text>
  <ellipse cx="1550" cy="335" rx="42" ry="20" class="attr"/><text x="1550" y="335" class="small">sku</text>
  <ellipse cx="1620" cy="440" rx="45" ry="20" class="attr"/><text x="1620" y="440" class="small">precio</text>
  <ellipse cx="1540" cy="545" rx="45" ry="20" class="attr"/><text x="1540" y="545" class="small">costo</text>
  <ellipse cx="1430" cy="570" rx="45" ry="20" class="attr"/><text x="1430" y="570" class="small">stock</text>
  <ellipse cx="1320" cy="540" rx="45" ry="20" class="attr"/><text x="1320" y="540" class="small">activo</text>
  <line x1="1340" y1="350" x2="1390" y2="405" class="line"/><line x1="1430" y1="330" x2="1430" y2="405" class="line"/>
  <line x1="1530" y1="350" x2="1480" y2="405" class="line"/><line x1="1575" y1="440" x2="1520" y2="440" class="line"/>
  <line x1="1520" y1="528" x2="1480" y2="475" class="line"/><line x1="1430" y1="550" x2="1430" y2="475" class="line"/><line x1="1345" y1="525" x2="1390" y2="475" class="line"/>

  <polygon points="1260,398 1325,440 1260,482 1195,440" class="rel"/><text x="1260" y="440" class="small">corresponde</text>
  <line x1="1150" y1="440" x2="1195" y2="440" class="line"/><line x1="1325" y1="440" x2="1370" y2="440" class="line"/>
  <text x="1175" y="430" class="card">N</text><text x="1345" y="430" class="card">1</text>

  <!-- Categoria -->
  <rect x="1370" y="130" width="150" height="65" class="category"/>
  <text x="1445" y="162" class="label">Categoria</text>
  <ellipse cx="1310" cy="70" rx="62" ry="20" class="attr"/><text x="1310" y="70" class="key">id_categoria</text>
  <ellipse cx="1435" cy="55" rx="50" ry="20" class="attr"/><text x="1435" y="55" class="small">nombre</text>
  <ellipse cx="1585" cy="82" rx="65" ry="20" class="attr"/><text x="1585" y="82" class="small">descripcion</text>
  <line x1="1335" y1="86" x2="1385" y2="130" class="line"/><line x1="1435" y1="75" x2="1435" y2="130" class="line"/><line x1="1555" y1="98" x2="1495" y2="130" class="line"/>
  <polygon points="1445,235 1510,280 1445,325 1380,280" class="rel"/><text x="1445" y="280" class="small">pertenece</text>
  <line x1="1445" y1="195" x2="1445" y2="235" class="line"/><line x1="1445" y1="325" x2="1445" y2="405" class="line"/>
  <text x="1460" y="220" class="card">1</text><text x="1460" y="365" class="card">N</text>

  <!-- Proveedor -->
  <rect x="1370" y="700" width="150" height="65" class="provider"/>
  <text x="1445" y="732" class="label">Proveedor</text>
  <ellipse cx="1305" cy="815" rx="62" ry="20" class="attr"/><text x="1305" y="815" class="key">id_proveedor</text>
  <ellipse cx="1445" cy="845" rx="50" ry="20" class="attr"/><text x="1445" y="845" class="small">nombre</text>
  <ellipse cx="1585" cy="815" rx="55" ry="20" class="attr"/><text x="1585" y="815" class="small">telefono</text>
  <ellipse cx="1320" cy="660" rx="45" ry="20" class="attr"/><text x="1320" y="660" class="small">email</text>
  <ellipse cx="1600" cy="665" rx="48" ry="20" class="attr"/><text x="1600" y="665" class="small">ciudad</text>
  <line x1="1340" y1="802" x2="1385" y2="765" class="line"/><line x1="1445" y1="825" x2="1445" y2="765" class="line"/>
  <line x1="1550" y1="802" x2="1500" y2="765" class="line"/><line x1="1345" y1="675" x2="1385" y2="700" class="line"/><line x1="1570" y1="680" x2="1505" y2="700" class="line"/>
  <polygon points="1445,575 1510,620 1445,665 1380,620" class="rel"/><text x="1445" y="620" class="small">suministra</text>
  <line x1="1445" y1="475" x2="1445" y2="575" class="line"/><line x1="1445" y1="665" x2="1445" y2="700" class="line"/>
  <text x="1460" y="540" class="card">N</text><text x="1460" y="690" class="card">1</text>
</svg>
